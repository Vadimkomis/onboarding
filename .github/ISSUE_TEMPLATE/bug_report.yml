name: Bug report
description: Report a reproducible problem with the package
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the platform, OS or API level, toolchain, and device, simulator, or emulator.
      placeholder: "iOS 17.5 / Xcode 15.4 / iPhone simulator, or Android API 35 / Android Studio / Pixel emulator"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure OnboardingGate with ...
        2. Launch the app
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: other_platform
    attributes:
      label: Other platform behavior
      description: Describe the same scenario on the other supported platform, or state that it has not been tested there.
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample
      description: Paste a minimal Swift or Kotlin snippet, or link to a reproduction project.
      render: text
