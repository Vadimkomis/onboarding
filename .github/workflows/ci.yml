name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-15
    timeout-minutes: 10
    env:
      DERIVED_DATA_PATH: .build/DerivedData

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Cache Swift build data
        uses: actions/cache@v4
        with:
          path: |
            .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -showsdks

      - name: Show destinations
        run: xcodebuild -showdestinations -scheme Onboarding

      - name: Run tests
        timeout-minutes: 6
        run: |
          xcodebuild test \
            -quiet \
            -scheme Onboarding \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -derivedDataPath "$DERIVED_DATA_PATH"
