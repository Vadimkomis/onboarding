name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-15
    timeout-minutes: 10
    env:
      SOURCE_PACKAGES_PATH: .build/SourcePackages

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure and validate Swift cache paths
        shell: bash
        run: |
          derived_data_path="$RUNNER_TEMP/OnboardingDerivedData"
          cache_path="$GITHUB_WORKSPACE/$SOURCE_PACKAGES_PATH"
          echo "DERIVED_DATA_PATH=$derived_data_path" >> "$GITHUB_ENV"

          case "$derived_data_path" in
            "$cache_path"|"$cache_path"/*)
              echo "::error::Swift dependency cache must not include DerivedData"
              exit 1
              ;;
          esac

      - name: Cache Swift package sources
        uses: actions/cache@v4
        with:
          path: ${{ env.SOURCE_PACKAGES_PATH }}
          key: ${{ runner.os }}-swift-packages-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-packages-

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -showsdks

      - name: Show destinations
        run: |
          xcodebuild -showdestinations \
            -scheme Onboarding \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"

      - name: Run tests
        timeout-minutes: 6
        run: |
          xcodebuild test \
            -quiet \
            -scheme Onboarding \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH"

  android-checks:
    name: Android Lint, JVM/Screenshot Tests, AAR, and Publication
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      LANG: en_US.UTF-8
      TZ: UTC

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android lint, tests, release assembly, and publication
        run: |
          ./gradlew -Dmaven.repo.local="$RUNNER_TEMP/onboarding-m2" \
            :onboarding-android:lint \
            :onboarding-android:testDebugUnitTest \
            :onboarding-android:validateDebugScreenshotTest \
            :onboarding-android:compileDebugAndroidTestKotlin \
            :onboarding-android:assembleRelease \
            :onboarding-android:publishToMavenLocal

      - name: Upload Android screenshot report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshot-report
          path: onboarding-android/build/reports/screenshotTest/preview/debug
          if-no-files-found: ignore
          retention-days: 7
