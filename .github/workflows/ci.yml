name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-26
    env:
      IOS_RUNTIME_VERSION: "26.5"
      IOS_DEVICE_TYPE: com.apple.CoreSimulator.SimDeviceType.iPhone-17
      IOS_SIMULATOR_NAME: CI iPhone 17

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26.5*.app' | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.5 is not installed on this runner"
            find /Applications -maxdepth 1 -name 'Xcode*.app' | sort
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          sudo xcodebuild -runFirstLaunch

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -showsdks

      - name: Install iOS simulator platform
        run: |
          if ! xcrun simctl list runtimes | grep -q "^iOS ${IOS_RUNTIME_VERSION} "; then
            sudo xcodebuild -downloadPlatform iOS -buildVersion "${IOS_RUNTIME_VERSION}"
          fi
          xcrun simctl list runtimes

      - name: Create iOS simulator
        run: |
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-${IOS_RUNTIME_VERSION//./-}"
          if ! xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "Missing required iOS simulator runtime: $RUNTIME_ID"
            exit 1
          fi

          IOS_SIMULATOR_ID="$(xcrun simctl create "$IOS_SIMULATOR_NAME" "$IOS_DEVICE_TYPE" "$RUNTIME_ID")"
          echo "IOS_SIMULATOR_ID=$IOS_SIMULATOR_ID" >> "$GITHUB_ENV"
          xcrun simctl list devices "$RUNTIME_ID"

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Onboarding \
            -destination "platform=iOS Simulator,id=${IOS_SIMULATOR_ID}"
