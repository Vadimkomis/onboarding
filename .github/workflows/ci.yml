name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26.5*.app' | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.5 is not installed on this runner"
            find /Applications -maxdepth 1 -name 'Xcode*.app' | sort
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -showsdks

      - name: Install iOS simulator platform
        run: |
          if ! xcrun simctl list runtimes | grep -q '^iOS '; then
            sudo xcodebuild -downloadPlatform iOS
          fi
          xcrun simctl list runtimes

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme Onboarding \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest'
