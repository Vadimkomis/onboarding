name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-15
    timeout-minutes: 10
    env:
      DERIVED_DATA_PATH: .build/DerivedData

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Cache Swift build data
        uses: actions/cache@v4
        with:
          path: |
            .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -showsdks

      - name: Show destinations
        run: xcodebuild -showdestinations -scheme Onboarding

      - name: Run tests
        timeout-minutes: 6
        run: |
          xcodebuild test \
            -quiet \
            -scheme Onboarding \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -derivedDataPath "$DERIVED_DATA_PATH"

  android-checks:
    name: Android Lint, JVM Tests, AAR, and Publication
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android lint, JVM tests, release assembly, and publication
        run: |
          ./gradlew -Dmaven.repo.local="$RUNNER_TEMP/onboarding-m2" \
            :onboarding-android:lint \
            :onboarding-android:testDebugUnitTest \
            :onboarding-android:compileDebugAndroidTestKotlin \
            :onboarding-android:assembleRelease \
            :onboarding-android:publishToMavenLocal
