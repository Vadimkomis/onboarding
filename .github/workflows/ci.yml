name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test
